name: Weekly Kaizen — Agent Improvement Analysis

on:
  schedule:
    - cron: '30 14 * * 5'   # 14:30 UTC = 16:30 SAST every Friday
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  kaizen:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit updated memory files + index.html

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Kaizen analysis
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kaizen_analyze.py

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add index.html memory/
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "kaizen: weekly analysis $(date -u +%Y-%m-%d)"
            git push
          )
